name: LinkedIn Job Scraper

on:
  schedule:
    - cron: '0 11 * * *'   # 08:00 horario de Brasilia (UTC-3 = 11:00 UTC)
  workflow_dispatch:        # permite rodar manualmente pelo site

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Resolve o aviso de deprecacao do Node 20

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps

      - name: Rodar scraper
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          TO_EMAILS: ${{ secrets.TO_EMAIL }}
        run: python scraper.py --once

      - name: Salvar seen_jobs.json no repositorio
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f seen_jobs.json ]; then
            git add seen_jobs.json
            git diff --staged --quiet || git commit -m "chore: atualiza vagas vistas"
            git push
          else
            echo "seen_jobs.json nao encontrado; nada para versionar."
          fi

