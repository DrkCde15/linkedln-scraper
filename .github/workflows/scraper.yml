name: LinkedIn Job Scraper

on:
  schedule:
    - cron: '0 11 * * *'   # 08:00 horario de Brasilia (UTC-3 = 11:00 UTC)
  workflow_dispatch:        # permite rodar manualmente pelo site

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps

      - name: Criar config com secrets
        run: |
          cat > config.py << 'EOF'
          SEARCH_QUERIES = [
            "python junior remoto site:linkedin.com/jobs",
            "python developer junior remote Sao Paulo site:linkedin.com/jobs",
            "desenvolvedor python junior remoto site:linkedin.com/jobs",
          ]
          MAX_RESULTS_PER_QUERY = 15
          SMTP_HOST     = "smtp.gmail.com"
          SMTP_PORT     = 587
          SMTP_USER     = "${{ secrets.SMTP_USER }}"
          SMTP_PASSWORD = "${{ secrets.SMTP_PASSWORD }}"
          TO_EMAILS     = ["${{ secrets.TO_EMAIL }}"]
          RUN_HOUR      = 8
          RUN_MINUTE    = 0
          SEEN_JOBS_FILE = "seen_jobs.json"
          LOG_FILE       = "scraper.log"
          EOF

      - name: Rodar scraper
        run: python scraper.py --once

      - name: Salvar seen_jobs.json no repositorio
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f seen_jobs.json ]; then
            git add seen_jobs.json
            git diff --staged --quiet || git commit -m "chore: atualiza vagas vistas"
            git push
          else
            echo "seen_jobs.json nao encontrado; nada para versionar."
          fi
